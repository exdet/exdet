name: Update language stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: profile-language-stats
  cancel-in-progress: false

jobs:
  update-language-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check project files
        shell: bash
        run: |
          test -f README.md || (echo "::error::README.md not found in repository root" && exit 1)
          test -f scripts/update_language_stats.py || (echo "::error::scripts/update_language_stats.py not found. Upload the full project, not only README.md" && exit 1)
          mkdir -p assets
          python -m py_compile scripts/update_language_stats.py

      - name: Check stats token
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        shell: bash
        run: |
          if [ -z "$GH_STATS_TOKEN" ]; then
            echo "::error::GH_STATS_TOKEN secret is missing. Create it in Settings -> Secrets and variables -> Actions -> New repository secret."
            exit 1
          fi
          echo "GH_STATS_TOKEN is present."

      - name: Generate language stats
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
          REPO_AFFILIATION: owner
          INCLUDE_PRIVATE: "true"
          INCLUDE_FORKS: "false"
          INCLUDE_ARCHIVED: "true"
          EXCLUDE_CURRENT_REPO: "true"
          COUNT_MODE: dominant
          MAX_LANGUAGES: "8"
          SVG_TITLE: "Repository Language Stats"
          WRITE_JSON: "true"
        run: python scripts/update_language_stats.py

      - name: Commit updated stats
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/languages.svg assets/languages.json .gitattributes
          if git diff --staged --quiet; then
            echo "No language stats changes."
            exit 0
          fi
          git commit -m "chore: update language stats"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
