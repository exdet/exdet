name: Update language stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  update-language-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate language stats
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
          REPO_AFFILIATION: owner,collaborator,organization_member
          INCLUDE_PRIVATE: "true"
          INCLUDE_FORKS: "false"
          INCLUDE_ARCHIVED: "true"
          EXCLUDE_CURRENT_REPO: "true"
          MAX_LANGUAGES: "8"
          SVG_TITLE: "Language Stats"
        run: python scripts/update_language_stats.py

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/languages.svg
          if git diff --staged --quiet; then
            echo "No language stats changes."
          else
            git commit -m "chore: update language stats"
            git push
          fi
