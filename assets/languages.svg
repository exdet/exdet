<svg width="860" height="210" viewBox="0 0 860 210" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Language Stats</title>
  <desc id="desc">GitHub repository language statistics placeholder.</desc>
  <rect width="860" height="210" rx="22" fill="#0d1117"/>
  <rect x="1" y="1" width="858" height="208" rx="21" stroke="#30363d"/>
  <circle cx="780" cy="54" r="78" fill="#161b22" opacity="0.65"/>
